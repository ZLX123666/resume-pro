<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>简历编辑器 · Resume Pro</title>
<style>
@page{size:A4;margin:0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f1f5f9;height:100vh;overflow:hidden}

/* === Top Bar === */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;background:#1e293b;color:#fff;height:50px}
.top-bar .logo{font-weight:900;font-size:1.1rem}
.top-bar select{padding:6px 12px;border-radius:8px;border:1px solid #475569;background:#334155;color:#fff;font-size:.85rem;cursor:pointer}
.top-bar button{padding:6px 18px;border-radius:8px;border:none;font-weight:700;cursor:pointer;font-size:.85rem;transition:all .2s}
.btn-preview{background:#3b82f6;color:#fff}
.btn-preview:hover{background:#2563eb}
.btn-export{background:#059669;color:#fff}
.btn-export:hover{background:#047857}
.btn-export:disabled{background:#475569;cursor:not-allowed;opacity:.5}

/* === Main Layout === */
.main{display:flex;height:calc(100vh - 50px)}
.editor{width:420px;background:#fff;overflow-y:auto;padding:20px;border-right:1px solid #e2e8f0;flex-shrink:0}
.preview{flex:1;background:#e5e7eb;overflow-y:auto;display:flex;justify-content:center;padding:20px}

/* === Editor Form === */
.editor h3{font-size:.85rem;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid #e2e8f0}
.editor h3:first-child{margin-top:0}
.form-row{display:flex;gap:8px;margin-bottom:8px}
.form-group{flex:1;margin-bottom:8px}
.form-group label{display:block;font-size:.75rem;font-weight:700;color:#475569;margin-bottom:3px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:.82rem;font-family:inherit;transition:border-color .2s}
.form-group input:focus,.form-group textarea:focus{border-color:#3b82f6;outline:none;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.form-group textarea{resize:vertical;min-height:60px}
.skill-input{display:flex;gap:4px;margin-bottom:4px}
.skill-input input{flex:1}
.skill-input button{padding:6px 10px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.75rem}
.skills-display{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.skill-chip{padding:2px 8px;background:#eff6ff;color:#2563eb;border-radius:12px;font-size:.72rem;font-weight:600;display:flex;align-items:center;gap:4px}
.skill-chip .del{cursor:pointer;font-weight:700;color:#ef4444}

.add-item-btn{width:100%;padding:6px;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:8px;color:#64748b;cursor:pointer;font-size:.78rem;margin-top:4px}
.add-item-btn:hover{background:#f1f5f9}

/* === Resume Preview (A4) === */
.resume-preview{width:210mm;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,0.12);padding:22mm 20mm;font-size:12px;line-height:1.6;min-height:297mm}
@media print{
  body{background:#fff;overflow:visible}
  .top-bar,.editor{display:none}
  .main{display:block;height:auto}
  .preview{display:block;background:#fff;padding:0;overflow:visible}
  .resume-preview{box-shadow:none;width:100%;min-height:auto;padding:15mm}
}

/* Template Styles */
.tpl-minimal .header-name{font-size:24px;font-weight:900;border-bottom:3px solid #2563eb;padding-bottom:10px;margin-bottom:4px}
.tpl-minimal .header-title{color:#2563eb;font-size:13px;font-weight:600;margin-bottom:6px}
.tpl-minimal .header-contact{color:#666;font-size:10px;display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.tpl-minimal .section-title{font-size:12px;font-weight:700;text-transform:uppercase;color:#2563eb;letter-spacing:2px;border-bottom:1px solid #e5e7eb;padding-bottom:3px;margin:14px 0 8px}
.tpl-minimal .exp-item{margin-bottom:10px}
.tpl-minimal .exp-header{display:flex;justify-content:space-between;font-weight:700;font-size:13px}
.tpl-minimal .exp-org{color:#555;font-size:11px}
.tpl-minimal .exp-date{color:#888;font-size:10px;white-space:nowrap}
.tpl-minimal .exp-desc{color:#555;font-size:11px;margin-top:3px}
.tpl-minimal .skills-row{display:flex;flex-wrap:wrap;gap:6px}
.tpl-minimal .skill-tag{padding:3px 12px;background:#eff6ff;color:#2563eb;border-radius:20px;font-size:10px;font-weight:600}

.tpl-tech{background:#111827;color:#e2e8f0}
.tpl-tech .header-name{font-size:22px;font-weight:900;color:#f1f5f9}
.tpl-tech .header-title{color:#3b82f6;font-size:12px;font-weight:600;margin-bottom:4px}
.tpl-tech .header-contact{color:#94a3b8;font-size:10px;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.tpl-tech .section-title{font-size:11px;font-weight:700;text-transform:uppercase;color:#3b82f6;letter-spacing:3px;border-bottom:1px solid #1e3a5f;padding-bottom:3px;margin:14px 0 8px}
.tpl-tech .exp-item{background:rgba(59,130,246,0.05);border-left:3px solid #3b82f6;padding:8px 12px;margin-bottom:8px;border-radius:0 6px 6px 0}
.tpl-tech .exp-header{display:flex;justify-content:space-between;font-weight:700;font-size:13px;color:#f1f5f9}
.tpl-tech .exp-org{color:#3b82f6;font-size:11px}
.tpl-tech .exp-date{color:#64748b;font-size:10px}
.tpl-tech .exp-desc{color:#94a3b8;font-size:11px;margin-top:3px}
.tpl-tech .skills-row{display:flex;flex-wrap:wrap;gap:6px}
.tpl-tech .skill-tag{padding:3px 10px;background:rgba(59,130,246,0.15);color:#60a5fa;border-radius:4px;font-size:10px;font-weight:600}

.tpl-creative{display:grid;grid-template-columns:160px 1fr;min-height:100%}
.tpl-creative .sidebar{background:linear-gradient(180deg,#f59e0b,#d97706);color:#fff;padding:24px 16px}
.tpl-creative .sidebar .header-name{font-size:18px;font-weight:800;text-align:center;margin-bottom:2px}
.tpl-creative .sidebar .header-title{text-align:center;font-size:10px;opacity:.9;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.tpl-creative .sidebar .contact-info{font-size:9px;opacity:.9;margin-bottom:14px}
.tpl-creative .sidebar .section-title{font-size:9px;text-transform:uppercase;letter-spacing:2px;border-bottom:1px solid rgba(255,255,255,0.3);padding-bottom:3px;margin-bottom:6px}
.tpl-creative .main{padding:20px 18px;display:block;height:auto;overflow:visible}
.tpl-creative .main .section-title{font-size:10px;text-transform:uppercase;color:#d97706;letter-spacing:3px;border-bottom:2px solid #fef3c7;padding-bottom:3px;margin:12px 0 6px}
.tpl-creative .exp-item{margin-bottom:8px}
.tpl-creative .exp-header{display:flex;justify-content:space-between;font-weight:700;font-size:12px}
.tpl-creative .exp-org{color:#d97706;font-size:10px;font-weight:600}
.tpl-creative .exp-date{font-size:9px;color:#999}
.tpl-creative .exp-desc{color:#666;font-size:10px;margin-top:2px}
.tpl-creative .skills-row{display:flex;flex-wrap:wrap;gap:4px}
.tpl-creative .skill-tag{padding:2px 8px;background:#fef3c7;color:#92400e;border-radius:10px;font-size:9px;font-weight:600}

/* === Business === */
.tpl-business{font-family:'Georgia','Times New Roman','SimSun',serif}
.tpl-business .header-name{font-size:22px;font-weight:700;text-align:center;letter-spacing:3px;text-transform:uppercase;color:#1e3a5f;margin-bottom:2px}
.tpl-business .header-title{text-align:center;font-size:12px;color:#555;letter-spacing:1px;margin-bottom:8px}
.tpl-business .header-contact{text-align:center;font-size:10px;color:#777;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.tpl-business .divider{border:none;border-top:2px solid #1e3a5f;margin:12px 0}
.tpl-business .section-title{font-size:11px;font-weight:700;text-transform:uppercase;color:#1e3a5f;letter-spacing:3px;margin:12px 0 8px}
.tpl-business .exp-header{display:flex;justify-content:space-between;font-weight:700;font-size:12px;margin-bottom:2px}
.tpl-business .exp-org{font-style:italic;color:#555;font-size:11px}
.tpl-business .exp-date{font-size:10px;color:#888}
.tpl-business .exp-desc{font-size:10px;color:#555;margin-top:3px}

/* === Graduate === */
.tpl-graduate .header-name{font-size:22px;font-weight:900;text-align:center;letter-spacing:2px;margin-bottom:2px}
.tpl-graduate .header-meta{text-align:center;font-size:10px;color:#888;margin-bottom:4px}
.tpl-graduate .header-contact{text-align:center;font-size:10px;color:#666;margin-bottom:12px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.tpl-graduate .grad-divider{width:60px;height:3px;background:#1a1a1a;margin:0 auto 12px}
.tpl-graduate .section-title{font-size:12px;font-weight:700;color:#1a1a1a;border-bottom:1px solid #e5e7eb;padding-bottom:3px;margin:12px 0 8px;display:flex;align-items:center;gap:6px}
.tpl-graduate .section-title::before{content:'';width:4px;height:14px;background:#1a1a1a;border-radius:2px}
.tpl-graduate .edu-grid{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-size:11px;margin-bottom:8px}
.tpl-graduate .edu-label{color:#888}
.tpl-graduate .edu-value{font-weight:600}
.tpl-graduate .exp-header{display:flex;justify-content:space-between;font-weight:700;font-size:12px;margin-bottom:2px}
.tpl-graduate .exp-org{color:#555;font-size:11px}
.tpl-graduate .exp-date{font-size:10px;color:#999}
.tpl-graduate .exp-desc{font-size:10px;color:#555;margin-top:3px}

/* === Classic Two-Column === */
.tpl-classic{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.tpl-classic .left-col,.tpl-classic .right-col{font-size:10px}
.tpl-classic .header-name{font-size:26px;font-weight:900;text-align:center;margin-bottom:4px;grid-column:1/-1;letter-spacing:1px}
.tpl-classic .header-title{text-align:center;font-size:13px;color:#666;margin-bottom:10px;grid-column:1/-1}
.tpl-classic .header-contact{text-align:center;font-size:10px;color:#888;margin-bottom:12px;grid-column:1/-1;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.tpl-classic .section-title{font-size:11px;font-weight:700;text-transform:uppercase;color:#2563eb;letter-spacing:2px;border-bottom:2px solid #bfdbfe;padding-bottom:3px;margin:10px 0 6px}
.tpl-classic .exp-header{font-weight:700;font-size:11px;margin-bottom:1px}
.tpl-classic .exp-org{color:#2563eb;font-size:10px;font-weight:600}
.tpl-classic .exp-date{font-size:9px;color:#999}
.tpl-classic .exp-desc{font-size:10px;color:#555;margin-top:2px}

/* === Timeline === */
.tpl-timeline .header-name{font-size:24px;font-weight:900;text-align:center;margin-bottom:2px}
.tpl-timeline .header-title{text-align:center;font-size:13px;color:#666;margin-bottom:6px}
.tpl-timeline .header-contact{text-align:center;font-size:10px;color:#888;margin-bottom:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.tpl-timeline .section-title{font-size:12px;font-weight:700;text-transform:uppercase;color:#7c3aed;letter-spacing:2px;border-bottom:2px solid #ede9fe;padding-bottom:3px;margin:14px 0 8px}
.tpl-timeline .timeline-item{position:relative;padding-left:20px;margin-bottom:12px;border-left:2px solid #e9d5ff}
.tpl-timeline .timeline-dot{position:absolute;left:-6px;top:4px;width:10px;height:10px;border-radius:50%;background:#7c3aed}
.tpl-timeline .exp-header{font-weight:700;font-size:12px;display:flex;justify-content:space-between}
.tpl-timeline .exp-org{color:#7c3aed;font-size:10px;font-weight:600}
.tpl-timeline .exp-date{font-size:10px;color:#999}
.tpl-timeline .exp-desc{font-size:10px;color:#555;margin-top:3px}

.pay-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;display:flex;align-items:center;justify-content:center;display:none}
.pay-overlay.show{display:flex}
.pay-box{background:#fff;border-radius:20px;padding:2rem;text-align:center;max-width:380px;width:90%}
.pay-box h3{font-size:1.3rem;margin-bottom:.5rem}
.pay-box .price{font-size:2.5rem;font-weight:900;color:#2563eb}
.pay-box .qr-img{width:180px;height:180px;margin:1rem auto;background:#fff;border-radius:12px}
.pay-box .qr-img img{width:100%;height:100%;object-fit:contain}
.pay-box button{padding:.8rem 2rem;background:#2563eb;color:#fff;border:none;border-radius:50px;font-weight:700;font-size:1rem;cursor:pointer;margin:.5rem .3rem}
.pay-box .btn-close{background:#e5e7eb;color:#333}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 24px;border-radius:10px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

@media(max-width:900px){
  .editor{width:320px;padding:14px}
}
</style>
</head>
<body>

<div class="top-bar">
  <span class="logo">📋 Resume Editor</span>
  <div style="display:flex;gap:8px;align-items:center">
    <select id="templateSelect" onchange="switchTemplate()">
      <option value="minimal">简约现代风</option>
      <option value="tech">技术极客风</option>
      <option value="creative">创意设计风</option>
      <option value="business">商务精英风</option>
      <option value="graduate">应届生专属</option>
      <option value="classic">经典双栏风</option>
      <option value="timeline">时间线风</option>
    </select>
    <button class="btn-preview" onclick="printPDF()">🖨️ 导出 PDF</button>
  </div>
</div>

<div class="main">
  <!-- Editor Panel -->
  <div class="editor" id="editorPanel">
    <h3>👤 基本信息</h3>
    <div class="form-row">
      <div class="form-group"><label>姓名</label><input id="in_name" value="张小明" oninput="update()"></div>
      <div class="form-group"><label>求职岗位</label><input id="in_title" value="高级产品经理" oninput="update()"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>邮箱</label><input id="in_email" value="zhangxm@email.com" oninput="update()"></div>
      <div class="form-group"><label>电话</label><input id="in_phone" value="138-0000-0000" oninput="update()"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>所在地</label><input id="in_location" value="北京" oninput="update()"></div>
      <div class="form-group"><label>个人链接</label><input id="in_link" value="github.com/zhangxm" oninput="update()"></div>
    </div>

    <h3>📝 个人总结</h3>
    <div class="form-group"><textarea id="in_summary" oninput="update()" rows="3">5年产品经验，主导过3款DAU百万级产品从0到1。擅长数据驱动决策和跨团队协作。</textarea></div>

    <h3>💼 工作经验</h3>
    <div id="expContainer"></div>
    <button class="add-item-btn" onclick="addExperience()">+ 添加工作经历</button>

    <h3>🎓 教育背景</h3>
    <div id="eduContainer"></div>
    <button class="add-item-btn" onclick="addEducation()">+ 添加教育经历</button>

    <h3>🛠 技能</h3>
    <div class="skill-input"><input id="in_skill" placeholder="输入技能名称，回车添加" onkeydown="if(event.key==='Enter'){event.preventDefault();addSkill()}"><button onclick="addSkill()">添加</button></div>
    <div class="skills-display" id="skillsDisplay"></div>
  </div>

  <!-- Preview Panel -->
  <div class="preview" id="previewPanel">
    <div class="resume-preview tpl-minimal" id="resumePreview"></div>
  </div>
</div>

<!-- Pay overlay -->
<div class="pay-overlay" id="payOverlay">
  <div class="pay-box">
    <h3>📱 扫码支付后即可导出</h3>
    <div class="price">￥5</div>
    <p style="color:#888;font-size:.9em">5套模板 · 无限次导出</p>
    <div class="qr-img"><img src="qr-wechat.png" alt="微信收款码"></div>
    <p style="color:#888;font-size:.8em">支付完成后截图联系客服获取解锁码</p>
    <button class="btn-close" onclick="document.getElementById('payOverlay').classList.remove('show')">稍后再说</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// State
var data={
  name:'张小明',title:'高级产品经理',email:'zhangxm@email.com',phone:'138-0000-0000',location:'北京',link:'github.com/zhangxm',
  summary:'5年产品经验，主导过3款DAU百万级产品从0到1。擅长数据驱动决策和跨团队协作。',
  experiences:[
    {title:'高级产品经理',org:'字节跳动',date:'2022.03 - 至今',desc:'负责抖音创作者工具产品线，管理3人产品团队\n主导AI剪辑功能从0到1，DAU突破50万\n重构发布流程，完成率从68%提升至89%'},
    {title:'产品经理',org:'美团',date:'2020.07 - 2022.02',desc:'负责商家后台管理系统优化，覆盖50万+商家\n设计智能定价建议功能，客单价提升18%'}
  ],
  education:[
    {school:'北京大学',degree:'计算机科学 · 硕士',date:'2018 - 2021',note:'GPA 3.8/4.0 · 校级优秀毕业生'}
  ],
  skills:['产品策略','数据分析','SQL','Figma','A/B测试','用户研究','Python','敏捷开发']
};
var currentTemplate='minimal';
var exportCount=0;

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}

// Build experience editor
function renderExperiences(){
  var c=document.getElementById('expContainer');
  c.innerHTML=data.experiences.map(function(e,i){
    return '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;margin-bottom:8px">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:.75rem;font-weight:700;color:#475569">经历 '+(i+1)+'</span><button onclick="removeExp('+i+')" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:.8rem">✕</button></div>'+
      '<div class="form-row"><div class="form-group"><label>职位</label><input value="'+esc(e.title)+'" oninput="data.experiences['+i+'].title=this.value;update()"></div><div class="form-group"><label>日期</label><input value="'+esc(e.date)+'" oninput="data.experiences['+i+'].date=this.value;update()"></div></div>'+
      '<div class="form-group"><label>公司</label><input value="'+esc(e.org)+'" oninput="data.experiences['+i+'].org=this.value;update()"></div>'+
      '<div class="form-group"><label>描述（每行一条）</label><textarea rows="3" oninput="data.experiences['+i+'].desc=this.value;update()">'+esc(e.desc)+'</textarea></div>'+
      '</div>';
  }).join('');
}
function addExperience(){data.experiences.push({title:'新职位',org:'公司名称',date:'2024.01 - 至今',desc:'描述你的工作内容和成果'});renderExperiences();update()}
function removeExp(i){data.experiences.splice(i,1);renderExperiences();update()}

function renderEducation(){
  var c=document.getElementById('eduContainer');
  c.innerHTML=data.education.map(function(e,i){
    return '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;margin-bottom:8px">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:.75rem;font-weight:700;color:#475569">教育 '+(i+1)+'</span><button onclick="removeEdu('+i+')" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:.8rem">✕</button></div>'+
      '<div class="form-row"><div class="form-group"><label>学校</label><input value="'+esc(e.school)+'" oninput="data.education['+i+'].school=this.value;update()"></div><div class="form-group"><label>日期</label><input value="'+esc(e.date)+'" oninput="data.education['+i+'].date=this.value;update()"></div></div>'+
      '<div class="form-group"><label>学位/专业</label><input value="'+esc(e.degree)+'" oninput="data.education['+i+'].degree=this.value;update()"></div>'+
      '<div class="form-group"><label>备注（GPA/荣誉等）</label><input value="'+esc(e.note)+'" oninput="data.education['+i+'].note=this.value;update()"></div>'+
      '</div>';
  }).join('');
}
function addEducation(){data.education.push({school:'学校名称',degree:'专业 · 学位',date:'2020 - 2024',note:'GPA X.X/4.0'});renderEducation();update()}
function removeEdu(i){data.education.splice(i,1);renderEducation();update()}

function addSkill(){
  var inp=document.getElementById('in_skill');
  var val=inp.value.trim();
  if(!val)return;
  data.skills.push(val);
  inp.value='';
  renderSkills();
  update();
}
function removeSkill(i){data.skills.splice(i,1);renderSkills();update()}
function renderSkills(){
  document.getElementById('skillsDisplay').innerHTML=data.skills.map(function(s,i){
    return '<span class="skill-chip">'+esc(s)+'<span class="del" onclick="removeSkill('+i+')">✕</span></span>';
  }).join('');
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// Template switching
function switchTemplate(){
  currentTemplate=document.getElementById('templateSelect').value;
  update();
}
function setTemplateClass(){document.getElementById('resumePreview').className='resume-preview tpl-'+currentTemplate}

// Render resume preview
function update(){
  var tpl=currentTemplate;
  var r=document.getElementById('resumePreview');
  setTemplateClass();

  var skillsHTML=data.skills.map(function(s){return '<span class="skill-tag">'+esc(s)+'</span>'}).join(' ');
  var expHTML=data.experiences.map(function(e){
    var descHTML=e.desc.split('\n').filter(Boolean).map(function(d){return '<li>'+esc(d)+'</li>'}).join('');
    return '<div class="exp-item"><div class="exp-header"><span>'+esc(e.title)+'</span><span class="exp-date">'+esc(e.date)+'</span></div><div class="exp-org">'+esc(e.org)+'</div><div class="exp-desc"><ul>'+descHTML+'</ul></div></div>';
  }).join('');
  var eduHTML=data.education.map(function(e){
    return '<div class="exp-item"><div class="exp-header"><span>'+esc(e.school)+'</span><span class="exp-date">'+esc(e.date)+'</span></div><div class="exp-org">'+esc(e.degree)+'</div><div class="exp-desc">'+esc(e.note)+'</div></div>';
  }).join('');

  if(tpl==='minimal'||tpl==='tech'){
    r.innerHTML=
      '<div class="header-name">'+esc(data.name)+'</div>'+
      '<div class="header-title">'+esc(data.title)+'</div>'+
      '<div class="header-contact"><span>📧 '+esc(data.email)+'</span><span>📱 '+esc(data.phone)+'</span><span>📍 '+esc(data.location)+'</span><span>🔗 '+esc(data.link)+'</span></div>'+
      (data.summary?'<div class="section-title">个人总结</div><p style="color:#555;font-size:11px;margin-bottom:6px">'+esc(data.summary)+'</p>':'')+
      '<div class="section-title">工作经验</div>'+expHTML+
      '<div class="section-title">教育背景</div>'+eduHTML+
      '<div class="section-title">技能</div><div class="skills-row">'+skillsHTML+'</div>';
  }else if(tpl==='creative'){
    r.innerHTML=
      '<div class="sidebar"><div class="header-name">'+esc(data.name)+'</div><div class="header-title">'+esc(data.title)+'</div>'+
      '<div class="contact-info">📧 '+esc(data.email)+'<br>📱 '+esc(data.phone)+'<br>📍 '+esc(data.location)+'<br>🔗 '+esc(data.link)+'</div>'+
      '<div class="section-title">技能</div><div class="skills-row" style="margin-bottom:10px">'+skillsHTML+'</div>'+
      '</div>'+
      '<div class="main">'+
      (data.summary?'<div class="section-title">关于我</div><p style="font-size:11px;color:#555;margin-bottom:8px">'+esc(data.summary)+'</p>':'')+
      '<div class="section-title">工作经验</div>'+expHTML+
      '<div class="section-title">教育背景</div>'+eduHTML+
      '</div>';
  }else if(tpl==='business'){
    r.innerHTML=
      '<div class="header-name">'+esc(data.name)+'</div>'+
      '<div class="header-title">'+esc(data.title)+'</div>'+
      '<div class="header-contact"><span>'+esc(data.email)+'</span><span>'+esc(data.phone)+'</span><span>'+esc(data.location)+'</span></div>'+
      '<hr class="divider">'+
      (data.summary?'<div class="section-title">Professional Summary</div><p style="font-size:11px;color:#555">'+esc(data.summary)+'</p>':'')+
      '<div class="section-title">Professional Experience</div>'+expHTML+
      '<div class="section-title">Education</div>'+eduHTML+
      '<div class="section-title">Skills</div><div class="skills-row">'+skillsHTML+'</div>';
  }else if(tpl==='graduate'){
    r.innerHTML=
      '<div class="header-name">'+esc(data.name)+'</div>'+
      '<div class="header-meta">男 · 22岁 · 应届毕业生</div>'+
      '<div class="header-contact"><span>📧 '+esc(data.email)+'</span><span>📱 '+esc(data.phone)+'</span><span>📍 '+esc(data.location)+'</span></div>'+
      '<div class="grad-divider"></div>'+
      '<div class="section-title">求职意向</div><p style="font-size:11px;color:#555;margin-bottom:8px"><strong>'+esc(data.title)+'（校招）</strong> · '+esc(data.location)+' · 可立即到岗</p>'+
      '<div class="section-title">教育背景</div>'+eduHTML+
      '<div class="section-title">实习/项目经历</div>'+expHTML+
      '<div class="section-title">技能</div><div class="skills-row">'+skillsHTML+'</div>'+
      (data.summary?'<div class="section-title">自我评价</div><p style="font-size:11px;color:#555">'+esc(data.summary)+'</p>':'');
  }else if(tpl==='classic'){
    // Split experiences and education into left/right columns
    var mid=Math.ceil(data.experiences.length/2);
    var expLeft=data.experiences.slice(0,mid).map(function(e){
      var descHTML=e.desc.split('\n').filter(Boolean).map(function(d){return '<li>'+esc(d)+'</li>'}).join('');
      return '<div class="exp-item"><div class="exp-header"><span>'+esc(e.title)+'</span></div><div class="exp-org">'+esc(e.org)+'</div><div class="exp-date">'+esc(e.date)+'</div><div class="exp-desc"><ul>'+descHTML+'</ul></div></div>';
    }).join('');
    var expRight=data.experiences.slice(mid).map(function(e){
      var descHTML=e.desc.split('\n').filter(Boolean).map(function(d){return '<li>'+esc(d)+'</li>'}).join('');
      return '<div class="exp-item"><div class="exp-header"><span>'+esc(e.title)+'</span></div><div class="exp-org">'+esc(e.org)+'</div><div class="exp-date">'+esc(e.date)+'</div><div class="exp-desc"><ul>'+descHTML+'</ul></div></div>';
    }).join('');
    r.innerHTML=
      '<div class="header-name">'+esc(data.name)+'</div>'+
      '<div class="header-title">'+esc(data.title)+'</div>'+
      '<div class="header-contact"><span>📧 '+esc(data.email)+'</span><span>📱 '+esc(data.phone)+'</span><span>📍 '+esc(data.location)+'</span><span>🔗 '+esc(data.link)+'</span></div>'+
      (data.summary?'<div style="grid-column:1/-1"><div class="section-title">个人总结</div><p style="font-size:10px;color:#555">'+esc(data.summary)+'</p></div>':'')+
      '<div class="left-col"><div class="section-title">工作经验</div>'+expLeft+'</div>'+
      '<div class="right-col"><div class="section-title">教育 & 技能</div>'+eduHTML+'<div class="section-title" style="margin-top:10px">技能</div><div class="skills-row">'+skillsHTML+'</div></div>';
  }else if(tpl==='timeline'){
    var timelineHTML=data.experiences.map(function(e){
      var descHTML=e.desc.split('\n').filter(Boolean).map(function(d){return '<li>'+esc(d)+'</li>'}).join('');
      return '<div class="timeline-item"><div class="timeline-dot"></div><div class="exp-header"><span>'+esc(e.title)+'</span><span class="exp-date">'+esc(e.date)+'</span></div><div class="exp-org">'+esc(e.org)+'</div><div class="exp-desc"><ul>'+descHTML+'</ul></div></div>';
    }).join('');
    r.innerHTML=
      '<div class="header-name">'+esc(data.name)+'</div>'+
      '<div class="header-title">'+esc(data.title)+'</div>'+
      '<div class="header-contact"><span>📧 '+esc(data.email)+'</span><span>📱 '+esc(data.phone)+'</span><span>📍 '+esc(data.location)+'</span><span>🔗 '+esc(data.link)+'</span></div>'+
      (data.summary?'<div class="section-title">关于我</div><p style="font-size:11px;color:#555;margin-bottom:6px">'+esc(data.summary)+'</p>':'')+
      '<div class="section-title">工作经历</div>'+timelineHTML+
      '<div class="section-title">教育背景</div>'+eduHTML+
      '<div class="section-title">技能</div><div class="skills-row">'+skillsHTML+'</div>';
  }
}

function printPDF(){
  exportCount++;
  if(exportCount>1){ // Allow first export as demo
    document.getElementById('payOverlay').classList.add('show');
  }
  window.print();
}

// Init
renderExperiences();
renderEducation();
renderSkills();
update();
</script>
</body>
</html>
